<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>EU TE AMO</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Great Vibes', cursive;
}

body {
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;

  background: linear-gradient(135deg, #4facfe, #ff7eb3);
}

/* Título */
h1 {
  color: rgb(161, 10, 10);
  font-size: 70px;
  text-shadow: 0 0 20px rgba(170, 69, 69, 0.8);
  margin-bottom: 40px;
}

/* Botão */
button {
  padding: 15px 40px;
  font-size: 20px;
  border: none;
  border-radius: 30px;
  background: #ff0040;
  color: rgb(5, 1, 1);
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

button:hover {
  transform: scale(1.1);
  background: #ff004c;
}

/* Corações */
.heart {
  position: absolute;
  color: red;
  font-size: 20px;
  animation: subir linear infinite;
  opacity: 0.7;
}

@keyframes subir {
  0% {
    transform: translateY(100vh);
    opacity: 5;
  }
  50% {
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}

/* Explosão */
.explosion-heart {
  position: absolute;
  font-size: 25px;
  color: red;
  pointer-events: none;
  animation: explode 2s ease-out forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y)) scale(1.5);
    opacity: 0;
  }
}

</style>
</head>

<body>

<h1>EU TE AMO ❤️</h1>
<button onclick="explodir()"> minha deusa ❤️</button>

<script>

// Corações subindo automaticamente
function criarCoracao() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 25) + "px";
  heart.style.animationDuration = (3 + Math.random() * 5) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 8000);
}

setInterval(criarCoracao, 300);

// Explosão de corações
function explodir() {
  for (let i = 0; i < 40; i++) {
    const heart = document.createElement("div");
    heart.classList.add("explosion-heart");
    heart.innerHTML = "❤️";

    const x = (Math.random() - 0.5) * 600 + "px";
    const y = (Math.random() - 0.5) * 600 + "px";

    heart.style.setProperty("--x", x);
    heart.style.setProperty("--y", y);

    heart.style.left = "50%";
    heart.style.top = "50%";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 1000);
  }
}

</script>

</body>
</html>
